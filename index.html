<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Management System — St. Edward's Memorial Junior School</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#8A191C;--navy-dark:#5E1012;--navy-light:#A8232A;
  --gold:#B8860B;--gold-light:#E8B923;--gold-bg:#FFF9E8;
  --green:#1E7D44;--green-bg:#F0FDF4;--green-light:#86EFAC;
  --red:#B52B2B;--red-bg:#FEF2F2;--red-light:#FCA5A5;
  --amber:#B45309;--amber-bg:#FFFBEB;--amber-light:#FCD34D;
  --bg:#FAF6F3;--surface:#FFFFFF;--border:#EAD9D9;--border2:#D8BFBF;
  --text:#1A1A1A;--text2:#4A4A4A;--text3:#7A7A7A;
  --radius:8px;--radius-sm:5px;--shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* SIDEBAR NAV */
.layout{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px}
.sidebar-logo img{width:54px;height:54px;flex-shrink:0;object-fit:contain}
.sidebar-logo .school-text{min-width:0}
.sidebar-logo .school-name{font-size:13px;font-weight:700;color:#fff;line-height:1.3}
.sidebar-logo .school-sub{font-size:10px;color:rgba(255,255,255,.65);margin-top:4px;line-height:1.4}
.sidebar-logo .term-badge{display:inline-block;background:var(--gold);color:#1a1a1a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:8px}
.nav-section{padding:10px 0 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;padding-left:18px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.75);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--gold)}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.35)}

/* MAIN */
.main{margin-left:230px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:700;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:10px}
.save-pill{font-size:11px;padding:4px 12px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-light);font-weight:600}
.content{padding:22px 24px;flex:1}

/* CARDS & STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;border-left:4px solid var(--border2);box-shadow:var(--shadow)}
.stat-card.income{border-color:var(--green)}
.stat-card.expense{border-color:var(--red)}
.stat-card.balance{border-color:var(--navy)}
.stat-card.outstanding{border-color:var(--amber)}
.stat-num{font-size:22px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.card-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.card-head-title{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.card-body{padding:18px}

/* FORMS */
.form-grid{display:grid;gap:10px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.fg-4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg-2a{grid-template-columns:2fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
label.lbl{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{height:36px;padding:0 10px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text);font-family:inherit;background:#fff;width:100%;transition:border .15s}
textarea{height:auto;padding:8px 10px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(138,25,28,.12)}
input[type=checkbox]{width:auto;height:auto}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-dark)}
.btn-gold{background:var(--gold);color:#1a1a1a}.btn-gold:hover{background:#9C7109}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border2)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-light)}.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-bg);color:var(--green);border:1.5px solid var
