<!-- ADDED: Staff Edit Modal -->
<div class="modal-overlay" id="staff-edit-modal" onclick="if(event.target===this) closeStaffEdit()">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="sem-title">Edit Staff Member</h3>
      <button class="modal-close" onclick="closeStaffEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid fg-4" style="margin-bottom:10px">
        <div class="form-group"><label class="lbl" for="sem-name">Full name</label><input id="sem-name"></div>
        <div class="form-group"><label class="lbl" for="sem-role">Role / Position</label><input id="sem-role"></div>
        <div class="form-group"><label class="lbl" for="sem-salary">Monthly salary (UGX)</label><input id="sem-salary" type="number"></div>
        <div class="form-group"><label class="lbl" for="sem-allowance">Monthly allowance (UGX)</label><input id="sem-allowance" type="number"></div>
      </div>
      <div class="form-grid fg-3" style="margin-bottom:10px">
        <div class="form-group"><label class="lbl" for="sem-phone">Phone</label><input id="sem-phone"></div>
        <div class="form-group"><label class="lbl" for="sem-nin">NIN (optional)</label><input id="sem-nin"></div>
        <div class="form-group"><label class="lbl" for="sem-joined">Date joined</label><input id="sem-joined" type="date"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="saveStaffEdit()" style="flex:1">✓ Save Changes</button>
        <button class="btn btn-danger" onclick="deleteStaffRecord()" style="flex:1">🗑 Delete Staff</button>
      </div>
      <div id="sem-msg" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<!-- ADDED: Allowances Panel -->
<div class="tab-panel" id="pt-allowances">
  <div class="two-col">
    <div class="card">
      <div class="card-head"><div class="card-head-title">💰 Record Allowance Payment</div></div>
      <div class="card-body">
        <div class="form-grid fg-2" style="margin-bottom:10px">
          <div class="form-group"><label class="lbl" for="all-staff">Staff member</label>
            <select id="all-staff"><option value="">-- Select staff --</option></select>
          </div>
          <div class="form-group"><label class="lbl" for="all-amt">Amount (UGX)</label><input id="all-amt" type="number" placeholder="e.g. 50000"></div>
        </div>
        <div class="form-grid fg-2" style="margin-bottom:10px">
          <div class="form-group"><label class="lbl" for="all-date">Date paid</label><input id="all-date" type="date"></div>
          <div class="form-group"><label class="lbl" for="all-month">Month</label>
            <select id="all-month">
              <option>January</option><option>February</option><option>March</option>
              <option>April</option><option>May</option><option selected>June</option>
              <option>July</option><option>August</option><option>September</option>
              <option>October</option><option>November</option><option>December</option>
            </select>
          </div>
        </div>
        <div class="form-grid fg-2" style="margin-bottom:10px">
          <div class="form-group"><label class="lbl" for="all-type">Allowance type</label>
            <select id="all-type">
              <option value="Transport">Transport</option>
              <option value="Meal">Meal</option>
              <option value="Duty">Duty/Special</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group"><label class="lbl" for="all-ref">Ref/Invoice No. (optional)</label><input id="all-ref" placeholder="e.g. REF-001"></div>
        </div>
        <div class="form-group" style="margin-bottom:10px"><label class="lbl" for="all-note">Note</label><input id="all-note" placeholder="e.g. Monthly transport allowance"></div>
        <button class="btn btn-primary" onclick="recordAllowance()" style="width:100%">✓ Record Allowance</button>
        <div id="all-msg"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-head-title">📋 Allowances Log</div>
      <div style="display:flex;gap:8px">
        <select id="all-f-staff" onchange="renderAllowancesLog()" style="height:28px;font-size:12px"><option value="">All staff</option></select>
        <button class="btn btn-success btn-xs" onclick="exportAllowancesCSV()">⬇ Export</button>
      </div>
    </div>
    <div style="padding:10px 18px"><input id="all-log-search" name="all-log-search" aria-label="Search allowances" placeholder="Search..." oninput="renderAllowancesLog(this.value)" style="height:30px;font-size:12px;width:100%"></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Date</th><th>Staff</th><th>Month</th><th>Type</th><th class="td-right">Amount (UGX)</th><th>Note</th><th></th></tr></thead>
      <tbody id="all-log-body"></tbody>
      <tfoot id="all-log-foot"></tfoot>
    </table></div>
  </div>
</div>
